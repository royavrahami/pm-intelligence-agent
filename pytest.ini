[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov
    -v

markers =
    integration: marks tests as integration tests (require network/API)
    slow: marks tests as slow-running
