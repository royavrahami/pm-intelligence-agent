name: Quality Gate

# Runs the lint + test suite on every push and pull request so the build
# badge reflects real test/lint status (not just that the agent ran).

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check src/ main.py

      - name: Tests (pytest + coverage)
        run: pytest

      - name: Type check (mypy)
        # Non-blocking for now: the codebase has known third-party-stub gaps.
        # Tracked for a follow-up; surfaced here for visibility.
        run: mypy src/
        continue-on-error: true
